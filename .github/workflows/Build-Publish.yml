name: Build & Release .NET 10

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{matrix.displayName}}
    runs-on: ${{matrix.os}}

    strategy:
      matrix:
        include:
          - runtime: win-x64
            displayName: Windows-x64
            os: windows-latest
            zipExt: zip
          - runtime: linux-x64
            displayName: Linux-x64
            os: ubuntu-latest
            zipExt: zip

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: >
          dotnet publish S6Patcher.csproj
          -c Release
          -r ${{matrix.runtime}}
          -o publish/${{matrix.runtime}}
          -p:DebugType=None
          -p:DebugSymbols=false
          -p:StripSymbols=true

      - name: Remove PDB files
        shell: bash
        run: |
          find publish/${{matrix.runtime}} -name "*.pdb" -delete || true

      - name: Compress (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $src = "publish/${{matrix.runtime}}"
          $dst = "${{matrix.displayName}}.${{matrix.zipExt}}"
          Compress-Archive -Path "$src\*" -DestinationPath $dst -CompressionLevel Optimal

      - name: Compress (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          cd publish/${{matrix.runtime}}
          zip -9 -r ../../${{matrix.displayName}}.${{matrix.zipExt}} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{matrix.displayName}}
          path: ${{matrix.displayName}}.${{matrix.zipExt}}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{steps.version.outputs.version}}
          tag_name: ${{github.ref_name}}
          draft: true
          files: artifacts/*.zip
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}